<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat - Global Room</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Application Logic (Modules allow Firebase SDK imports) -->
    <script type="module" src="js/global.js" defer></script>
</head>
<body>
    <div class="app-background"></div>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>ChatApp</h1>
                <span class="status-indicator"></span>
            </div>
            <div class="header-user-actions" id="header-actions">
                <img src="" alt="Profile" id="header-avatar" class="header-avatar">
                <button id="logout-button" class="btn-logout" aria-label="Logout" title="Logout">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </header>
        <!-- Main Chat Area -->
        <section class="chat-area" id="chat-area">
            <!-- State: Active Chat -->
            <div class="active-chat-container" id="active-chat-container">
                <div class="active-chat-header">
                    <button class="btn-back btn-back-always" id="btn-back" aria-label="Back to Dashboard">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </button>
                    <div class="global-avatar" style="margin-right: 12px; transform: scale(0.8)">🌍</div>
                    <h2 id="active-chat-name">Global Chat Room</h2>
                </div>

                <main class="chat-main" id="chat-main">
                    <div class="messages-wrapper">
                        <ul id="chat-messages" class="messages-list">
                            <!-- Messages will be injected here -->
                        </ul>
                    </div>
                </main>
                
                <footer class="chat-footer">
                    <form id="chat-form">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
                        <button type="submit" id="send-button" class="btn-icon" aria-label="Send message">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </footer>
            </div>
        </section>
    </div>
</body>
</html>
