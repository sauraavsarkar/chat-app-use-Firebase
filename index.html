<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- Application Logic (Modules allow Firebase SDK imports) -->
    <script type="module" src="js/auth.js" defer></script>
</head>
<body>
    <div class="app-background"></div>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>ChatApp</h1>
                <span class="status-indicator"></span>
            </div>
            <div class="header-user-actions hidden" id="header-actions">
                <img src="" alt="Profile" id="header-avatar" class="header-avatar">
                <button id="logout-button" class="btn-logout" aria-label="Logout" title="Logout">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </header>
        
        <!-- Login/Signup Form -->
        <div class="setup-container" id="setup-container">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Log in to enter the chat.</p>
            <form id="auth-form">
                <div id="signup-fields" class="hidden">
                    <input type="text" id="username-input" placeholder="Display Name (e.g. John)" autocomplete="off">
                </div>
                <input type="email" id="email-input" placeholder="Email Address" autocomplete="username" required>
                <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" required>
                
                <p class="error-msg hidden" id="auth-error"></p>
                
                <button type="submit" class="btn-primary" id="auth-submit">Log In</button>
                <p class="auth-toggle">
                    <span id="toggle-text">Don't have an account?</span> 
                    <a href="#" id="toggle-auth">Sign Up</a>
                </p>
            </form>
        </div>

        <!-- Dashboard Map (Shown after Login) -->
        <div class="dashboard-container hidden" id="dashboard-container">
            <a href="private.html" class="dashboard-btn btn-private">
                <div class="dashboard-icon">💬</div>
                Private Chats
            </a>
            
            <a href="global.html" class="dashboard-btn btn-global">
                <div class="dashboard-icon">🌍</div>
                Global Chat Room
            </a>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal-overlay hidden">
        <div class="profile-card">
            <button id="close-modal" class="btn-close">&times;</button>
            <img id="modal-avatar" src="" alt="Avatar" class="modal-avatar-large">
            <h3 id="modal-name">Name</h3>
            <p id="modal-email" class="modal-email-text">Email</p>
            <div class="profile-details-list">
                <div class="detail-item">
                    <span class="detail-label">User ID</span>
                    <span id="modal-uid" class="detail-value">...</span>
                </div>
            </div>
            <button id="modal-logout" class="btn-modal-logout">Logout</button>
        </div>
    </div>
</body>
</html>
