<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat</title>
    <meta name="description" content="A simple real-time chat application.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Application Logic (Modules allow Firebase SDK imports) -->
    <script type="module" src="js/script.js" defer></script>
</head>
<body>
    <div class="app-background"></div>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>ChatApp</h1>
                <span class="status-indicator"></span>
            </div>
            <div class="header-user-actions hidden" id="header-actions">
                <img src="" alt="Profile" id="header-avatar" class="header-avatar">
                <button id="logout-button" class="btn-logout" aria-label="Logout" title="Logout">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </header>
        
        <div class="setup-container" id="setup-container">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Log in to enter the chat.</p>
            <form id="auth-form">
                <div id="signup-fields" class="hidden">
                    <input type="text" id="username-input" placeholder="Display Name (e.g. John)" autocomplete="off">
                </div>
                <input type="email" id="email-input" placeholder="Email Address" autocomplete="username" required>
                <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" required>
                
                <p class="error-msg hidden" id="auth-error"></p>
                
                <button type="submit" class="btn-primary" id="auth-submit">Log In</button>
                <p class="auth-toggle">
                    <span id="toggle-text">Don't have an account?</span> 
                    <a href="#" id="toggle-auth">Sign Up</a>
                </p>
            </form>
        </div>

        <div class="app-body hidden" id="app-body">
            <!-- Sidebar: User List -->
            <aside class="users-sidebar" id="users-sidebar">
                <div class="sidebar-header">
                    <h2>Chats</h2>
                </div>
                <ul id="users-list" class="users-list">
                    <!-- Users will be injected here -->
                </ul>
            </aside>

            <!-- Main Chat Area -->
            <section class="chat-area" id="chat-area">
                <!-- State: No chat selected -->
                <div class="empty-chat-state" id="empty-chat-state">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="var(--text-secondary)" stroke-width="1.5" fill="none" class="mb-4">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    <p>Select a user from the sidebar to start a conversation</p>
                </div>

                <!-- State: Active Chat -->
                <div class="active-chat-container hidden" id="active-chat-container">
                    <div class="active-chat-header">
                        <button class="btn-back hidden" id="btn-back" aria-label="Back to users">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </button>
                        <img src="" id="active-chat-avatar" class="header-avatar" alt="">
                        <h2 id="active-chat-name">...</h2>
                    </div>

                    <main class="chat-main" id="chat-main">
                        <div class="messages-wrapper">
                            <ul id="chat-messages" class="messages-list">
                                <!-- Messages will be injected here -->
                            </ul>
                        </div>
                    </main>
                    
                    <footer class="chat-footer">
                        <form id="chat-form">
                            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
                            <button type="submit" id="send-button" class="btn-icon" aria-label="Send message">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </form>
                    </footer>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
